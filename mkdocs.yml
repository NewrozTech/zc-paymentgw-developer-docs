site_name: ZiCharge Merchant API
site_url: https://newroztech.github.io/zc-paymentgw-developer-docs/
site_description: Developer documentation for the ZiCharge Merchant Payment Gateway
site_author: ZiCharge Engineering
docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow
  font:
    text: Inter
    code: JetBrains Mono

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js


markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
      title: On this page
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - API Explorer: api-explorer.md
  - Deposit:
    - Initiate Payment: deposit/initiate-payment.md
    - IPN Callback: deposit/ipn-callback.md
    - Validate Payment: deposit/validate-payment.md
  - Withdrawal:
    - Generate API Key: withdrawal/generate-api-key.md
    - Cashback: withdrawal/cashback.md
    - Validate Payment: withdrawal/validate-payment.md
  - Authentication & Security: 02-authentication.md
  - Error Codes: 06-error-codes.md
  - Testing & Go-Live: 07-testing-and-go-live.md
  - Platform Notes: 08-migration-notes.md

plugins:
  - search:
      lang: en

extra:
  generator: false
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:integrations@zicharge.com
      name: Integration Support
